version: "3.9"

services:
  php-apache:
    image: thecodingmachine/php:8.1-v4-apache-node16

    volumes:
      - ./:/var/www/html

    depends_on:
      - mariadb

    environment:
      COMPOSER_ALLOW_SUPERUSER: 1
      APACHE_EXTENSION_DAV: 0
      PHP_INI_MEMORY_LIMIT: 1g
      PHP_INI_ERROR_REPORTING: E_ALL
      PHP_EXTENSIONS: pgsql gettext imap sockets zip curl dom gd exif intl mbstring bcmath curl dom opcache soap xml xmlrpc fileinfo pdo_sqlite pdo_mysql pdo_pgsql
      PECL_EXTENSION: sodium
      STARTUP_COMMAND_1: composer install

    labels:
      - "traefik.enable=true"

      # HTTP
      - "traefik.http.routers.laravel.rule=Host(`micro.dietergijsen.be`)"
      - "traefik.http.routers.laravel.entrypoints=web"
      - "traefik.http.routers.laravel.middlewares=redirect-to-https"

      # Redirect HTTP -> HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

      # HTTPS
      - "traefik.http.routers.laravel-secure.rule=Host(`micro.dietergijsen.be`)"
      - "traefik.http.routers.laravel-secure.entrypoints=websecure"
      - "traefik.http.routers.laravel-secure.tls=true"
      - "traefik.http.routers.laravel-secure.tls.certresolver=letsencrypt"

      # Apache listens on port 80 inside the container
      - "traefik.http.services.laravel.loadbalancer.server.port=80"

    networks:
      - default
      - proxy

  mariadb:
    image: mariadb:10.3

    volumes:
      - mariadb:/var/lib/mysql

    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_USER: "laravel"
      MYSQL_PASSWORD: "laravel"
      MYSQL_DATABASE: "laravel"

    networks:
      - default

volumes:
  mariadb:

networks:
  proxy:
    external: true
